AWSTemplateFormatVersion: '2010-09-09'
Description: >
  DynamoDB table for the Ledger Todo app. Single-table design:
    pk = "USER#<userId>"     sk = "TODO#<todoId>"      -> O(1) get/update/delete by id
  GSI1 gives a second access pattern, listing a user's todos in creation order without a scan:
    gsi1pk = "USER#<userId>" gsi1sk = "<createdAtIso>#<todoId>"
  "completed" filtering happens in the app layer, not via another index — at personal-app scale
  (dozens to low-thousands of items) a full list comfortably fits in one Query response, so a
  third GSI would be complexity the access pattern doesn't earn yet.
  Billing mode is PAY_PER_REQUEST (on-demand) so the table scales to zero cost when idle,
  which matches the "cheap for personal use" requirement — no provisioned capacity to tune.

Parameters:
  TableName:
    Type: String
    Default: ledger-todo

Resources:
  TodoTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: app
          Value: ledger-todo

Outputs:
  TableName:
    Value: !Ref TodoTable
  TableArn:
    Value: !GetAtt TodoTable.Arn
